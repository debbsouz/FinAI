<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | FinAI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #09090b;
      color: #fafafa;
    }
    .input-stripe {
      transition: all 0.2s ease;
      background: rgba(24, 24, 27, 0.5);
      border: 1px solid rgba(63, 63, 70, 0.3);
      color: white;
    }
    .input-stripe:focus {
      border-color: #8b5cf6;
      outline: 0;
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
      background: rgba(24, 24, 27, 0.8);
    }
    .glass {
      background: rgba(24, 24, 27, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(63, 63, 70, 0.3);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in {
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-violet-500/30">
  <div class="max-w-4xl w-full glass rounded-[32px] shadow-2xl overflow-hidden flex flex-col md:flex-row animate-slide-in">
    <!-- Lado Esquerdo: Resumo do Plano -->
    <div class="w-full md:w-5/12 bg-zinc-900/50 p-12 text-white flex flex-col justify-between border-r border-zinc-800/50">
      <div>
        <a href="landing.html" class="inline-flex items-center gap-2 text-zinc-500 hover:text-white transition-all mb-12 group">
          <i class="fas fa-arrow-left text-xs group-hover:-translate-x-1 transition-transform"></i>
          <span class="text-xs font-bold uppercase tracking-widest">Voltar</span>
        </a>
        
        <div class="space-y-8">
          <div class="space-y-2">
            <p class="text-violet-500 text-[10px] font-black uppercase tracking-[0.2em]">Sua Escolha</p>
            <h1 id="planTitle" class="text-4xl font-black tracking-tighter">FinAI Pro</h1>
          </div>
          
          <div class="flex items-baseline gap-2">
            <span id="planPrice" class="text-5xl font-black tracking-tighter text-white">R$ 29,00</span>
            <span class="text-zinc-500 text-sm font-medium uppercase tracking-widest">/mês</span>
          </div>

          <div class="h-px bg-gradient-to-r from-zinc-800 to-transparent w-full"></div>

          <ul id="planFeatures" class="space-y-5">
            <li class="flex gap-4 text-sm text-zinc-400 font-medium">
              <div class="w-5 h-5 rounded-full bg-violet-500/10 flex items-center justify-center shrink-0">
                <i class="fas fa-check text-violet-500 text-[10px]"></i>
              </div>
              Análises avançadas com IA
            </li>
          </ul>
        </div>
      </div>

      <div class="pt-12">
        <div class="flex items-center gap-3 opacity-30">
          <img src="assets/logo.svg" alt="FinAI" class="w-8 h-8">
          <span class="text-xl font-black tracking-tighter">FinAI</span>
        </div>
      </div>
    </div>

    <!-- Lado Direito: Formulário de Pagamento -->
    <div class="w-full md:w-7/12 p-12 bg-transparent">
      <h2 class="text-2xl font-black tracking-tighter text-white mb-10">Pagamento Seguro</h2>
      
      <form id="paymentForm" class="space-y-8">
        <div class="space-y-3">
          <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">E-mail de Acesso</label>
          <input type="email" id="email" required placeholder="seu@email.com" class="w-full rounded-2xl px-5 py-4 text-sm input-stripe">
        </div>

        <div class="space-y-3">
          <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Dados do Cartão</label>
          <div class="space-y-4">
            <div class="relative">
              <input type="text" id="cardNumber" required placeholder="0000 0000 0000 0000" class="w-full rounded-2xl px-5 py-4 text-sm input-stripe">
              <div class="absolute right-5 top-1/2 -translate-y-1/2 flex gap-3">
                <i class="fab fa-cc-visa text-zinc-600 text-xl"></i>
                <i class="fab fa-cc-mastercard text-zinc-600 text-xl"></i>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <input type="text" id="expiry" required placeholder="MM / AA" class="w-full rounded-2xl px-5 py-4 text-sm input-stripe">
              <input type="text" id="cvv" required placeholder="CVV" class="w-full rounded-2xl px-5 py-4 text-sm input-stripe">
            </div>
          </div>
        </div>

        <div class="space-y-3">
          <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Titular do Cartão</label>
          <input type="text" id="cardName" required placeholder="Nome impresso no cartão" class="w-full rounded-2xl px-5 py-4 text-sm input-stripe">
        </div>

        <div id="paymentError" class="hidden p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-bold text-center">
          <i class="fas fa-exclamation-circle mr-2"></i>
          Cartão inválido. Use 4242 4242 4242 4242 para teste.
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-black py-5 rounded-2xl transition-all shadow-2xl shadow-violet-600/20 flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-[0.98]">
          <i class="fas fa-spinner fa-spin hidden" id="loader"></i>
          <span>Confirmar Assinatura</span>
        </button>

        <div class="flex items-center justify-center gap-2 text-zinc-600">
          <i class="fas fa-lock text-[10px]"></i>
          <p class="text-[10px] font-bold uppercase tracking-widest">Pagamento 100% Seguro</p>
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('paymentError');

    // Detectar plano da URL
    const urlParams = new URLSearchParams(window.location.search);
    const planType = urlParams.get('plano') || 'mensal';
    
    const planData = {
      mensal: {
        title: 'Mensal PRO',
        price: 'R$ 19,90',
        period: '/mês',
        features: ['Acesso total à IA', 'Relatórios estratégicos ilimitados', 'Suporte Prioritário 24/7']
      },
      anual: {
        title: 'Anual',
        price: 'R$ 197,00',
        period: '/ano',
        features: ['Economia de 20%', 'Acesso completo ao sistema', 'Economia de 2 meses']
      },
      familiar: {
        title: 'Familiar PREMIUM',
        price: 'R$ 49,90',
        period: '/mês',
        features: ['Até 4 membros na mesma conta', 'Acesso Pro para todos', 'Gastos compartilhados']
      }
    };

    const currentPlan = planData[planType] || planData.mensal;
    document.getElementById('planTitle').textContent = currentPlan.title;
    document.getElementById('planPrice').textContent = currentPlan.price;
    
    // Atualizar o período (mês/ano) se necessário
    const periodSpan = document.querySelector('#planPrice').nextElementSibling;
    if (periodSpan) periodSpan.textContent = currentPlan.period;

    document.getElementById('planFeatures').innerHTML = currentPlan.features.map(f => `
      <li class="flex gap-4 text-sm text-zinc-400 font-medium">
        <div class="w-5 h-5 rounded-full bg-violet-500/10 flex items-center justify-center shrink-0">
          <i class="fas fa-check text-violet-500 text-[10px]"></i>
        </div>
        ${f}
      </li>
    `).join('');

    // Carregar e-mail da sessão se existir
    const session = JSON.parse(localStorage.getItem('session'));
    if (session && session.email) {
      document.getElementById('email').value = session.email;
      document.getElementById('cardName').value = session.name || session.nome;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
      errorMsg.classList.add('hidden');

      if (cardNumber !== '4242424242424242') {
        errorMsg.classList.remove('hidden');
        return;
      }

      // Iniciar loading
      btn.disabled = true;
      loader.classList.remove('hidden');
      btn.querySelector('span').textContent = 'Processando...';

      // Simular delay de 2 segundos
      await new Promise(resolve => setTimeout(resolve, 2000));

      // Salvar status e redirecionar
      const usuarioEmail = localStorage.getItem("usuario_logado") || "default";
      localStorage.setItem(`pagamento_confirmado_${usuarioEmail}`, "true");
      
      // Salvar o tipo de plano escolhido (Fonte única de verdade)
      const finalPlanName = planType.charAt(0).toUpperCase() + planType.slice(1);
      localStorage.setItem("planoUsuario", finalPlanName.toLowerCase()); // Valor base solicitado pelo usuário
      localStorage.setItem(`plano_${usuarioEmail}`, finalPlanName);
      localStorage.setItem("plano", finalPlanName);
      
      // Atualizar plano na sessão
      if (session) {
        const updatedUser = { ...session, plano: finalPlanName };
        localStorage.setItem('usuario', JSON.stringify(updatedUser));
        localStorage.setItem('session', JSON.stringify(updatedUser));
      }

      window.location.href = 'success.html';
    });

    // Formatação básica do número do cartão
    document.getElementById('cardNumber').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      let formatted = '';
      for (let i = 0; i < value.length && i < 16; i++) {
        if (i > 0 && i % 4 === 0) formatted += ' ';
        formatted += value[i];
      }
      e.target.value = formatted;
    });

    // Formatação da validade
    document.getElementById('expiry').addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 2) {
        e.target.value = value.substring(0, 2) + ' / ' + value.substring(2, 4);
      } else {
        e.target.value = value;
      }
    });
  </script>
</body>
</html>
