<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | FinAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #fafafa;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-violet-500/30">
    
    <div class="w-full max-w-[400px] space-y-8 animate-fade-in">
        <!-- Logo -->
        <div class="flex flex-col items-center text-center space-y-4">
            <a href="landing.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <img src="assets/logo.svg" alt="FinAI Logo" class="w-12 h-12">
                <span class="text-3xl font-black tracking-tighter text-white">FinAI</span>
            </a>
            <div class="space-y-1">
                <h1 class="text-xl font-bold text-white tracking-tight">Bem-vindo de volta</h1>
                <p class="text-sm text-zinc-500">Acesse sua consultoria estratégica agora</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="glass p-8 rounded-[32px] shadow-2xl shadow-violet-500/5">
            <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500 ml-1">E-mail</label>
                    <input type="email" required placeholder="exemplo@email.com" 
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-5 py-4 text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 transition-all">
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500">Senha</label>
                        <a href="#" class="text-[10px] font-black uppercase tracking-widest text-violet-500 hover:text-violet-400 transition-colors">Esqueceu?</a>
                    </div>
                    <input type="password" required placeholder="••••••••" 
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-5 py-4 text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 transition-all">
                </div>

                <button type="submit" 
                    class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-violet-600/20 transition-all active:scale-[0.98] mt-2">
                    Entrar no Sistema
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-zinc-800/50 text-center">
                <p class="text-sm text-zinc-500">
                    Não tem uma conta? 
                    <a href="#" class="text-white font-bold hover:text-violet-400 transition-colors ml-1">Criar conta</a>
                </p>
            </div>
        </div>

        <!-- Footer link -->
        <p class="text-center text-[10px] font-bold text-zinc-600 uppercase tracking-[0.3em]">
            &copy; 2026 FinAI Strategic Control
        </p>
    </div>

</body>
</html>
