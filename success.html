<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Confirmada | FinAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #fafafa;
            -webkit-font-smoothing: antialiased;
        }
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(63, 63, 70, 0.3);
        }
        @keyframes scaleIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-violet-500/30">

    <div class="max-w-md w-full text-center animate-scale-in">
        <div class="mb-8 relative inline-block">
            <div class="w-24 h-24 rounded-full bg-violet-500/10 flex items-center justify-center border border-violet-500/20 mx-auto">
                <i class="fas fa-check text-4xl text-violet-500"></i>
            </div>
            <div class="absolute -top-2 -right-2 w-8 h-8 rounded-full bg-violet-600 flex items-center justify-center animate-bounce shadow-lg shadow-violet-600/40">
                <i class="fas fa-sparkles text-white text-xs"></i>
            </div>
        </div>

        <h1 class="text-4xl font-black tracking-tighter mb-4 text-white">Assinatura confirmada com sucesso!</h1>
        <p class="text-zinc-400 mb-8 leading-relaxed">
            Seja bem-vindo ao próximo nível da sua gestão financeira. Seu plano <span id="planDisplay" class="text-white font-bold">PRO</span> já está ativo na sua conta.
        </p>

        <div class="glass p-6 rounded-3xl mb-10 border-dashed">
            <div class="flex items-center justify-between mb-2">
                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Status da Conta</span>
                <span class="px-2 py-0.5 rounded-full bg-green-500/10 text-green-500 text-[8px] font-black uppercase tracking-widest">Ativo</span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-sm font-medium text-zinc-300">Plano Escolhido</span>
                <span id="planName" class="text-sm font-black text-white">Mensal PRO</span>
            </div>
        </div>

        <div class="space-y-4">
            <a href="dashboard.html" class="block w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-zinc-200 transition-all shadow-2xl shadow-white/5 active:scale-95">
                Ir para o dashboard
                <i class="fas fa-arrow-right ml-2 text-xs"></i>
            </a>
            <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em]">Redirecionando em 5 segundos...</p>
        </div>
    </div>

    <script>
        // Recuperar plano do localStorage
        const plan = localStorage.getItem('plano') || 'Mensal PRO';
        document.getElementById('planDisplay').textContent = plan.toUpperCase();
        document.getElementById('planName').textContent = plan;

        // Redirecionamento automático opcional
        setTimeout(() => {
            // window.location.href = 'dashboard.html';
        }, 5000);
    </script>

</body>
</html>
