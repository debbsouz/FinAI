<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Confirmado | FinAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f6f9fc;
    }
    @keyframes checkmark {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-checkmark {
      animation: checkmark 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-12 text-center space-y-8 animate-slide-in">
    <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto animate-checkmark">
      <i class="fas fa-check text-4xl"></i>
    </div>
    
    <div class="space-y-2">
      <h1 class="text-3xl font-black text-[#30313d] tracking-tight">Pagamento Confirmado!</h1>
      <p class="text-gray-500">Parabéns, agora você é um usuário <strong>FinAI Pro</strong>.</p>
    </div>

    <div class="bg-gray-50 rounded-xl p-6 text-left space-y-4">
      <div class="flex justify-between text-sm">
        <span class="text-gray-400">Plano</span>
        <span class="font-bold text-[#30313d]">Professional (Mensal)</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-gray-400">Valor</span>
        <span class="font-bold text-[#30313d]">R$ 19,90</span>
      </div>
      <div class="flex justify-between text-sm">
        <span class="text-gray-400">Status</span>
        <span class="font-bold text-emerald-500 uppercase tracking-widest text-[10px]">Ativo</span>
      </div>
    </div>

    <div class="pt-4">
      <a href="dashboard.html" class="block w-full bg-[#635bff] hover:bg-[#5851e0] text-white font-bold py-4 rounded-lg transition-all shadow-lg text-center">
        Acessar meu Dashboard
      </a>
    </div>

    <p class="text-xs text-gray-400">
      Um recibo foi enviado para o seu e-mail.
    </p>
  </div>

  <script>
    // Garantir que o status Pro está salvo (reforço)
    localStorage.setItem("pagamento_confirmado", "true");
    const session = JSON.parse(localStorage.getItem('session'));
    if (session) {
      const updatedUser = { ...session, plano: 'Pro' };
      localStorage.setItem('usuario', JSON.stringify(updatedUser));
      localStorage.setItem('session', JSON.stringify(updatedUser));
    }
  </script>
</body>
</html>
