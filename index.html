<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos IA • Controle Financeiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-7xl mx-auto p-8">
    
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
      <div class="flex items-center gap-4">
        <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-xl font-semibold">
          GI
        </div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tight">Gastos IA</h1>
          <p class="text-zinc-400 text-sm">Controle financeiro inteligente</p>
        </div>
      </div>
      
      <nav class="flex items-center gap-8 text-sm">
        <a href="#" class="text-white">Dashboard</a>
        <a href="#" class="hover:text-white transition-colors">Histórico</a>
        <a href="#" class="hover:text-white transition-colors">Relatórios</a>
      </nav>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- Formulário -->
      <div class="lg:col-span-5">
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h2 class="text-2xl font-semibold mb-6">Novo gasto</h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Descrição</label>
              <input 
                id="descricao" 
                type="text" 
                placeholder="Ex: Almoço no restaurante"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">
            </div>

            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-zinc-400 text-sm mb-2">Valor</label>
                <div class="relative">
                  <span class="absolute left-5 top-4 text-zinc-400">R$</span>
                  <input 
                    id="valor" 
                    type="number" 
                    step="0.01"
                    placeholder="0,00"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl pl-12 pr-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">
                </div>
              </div>

<label for="data" class="block text-zinc-400 text-sm mb-2">Data</label>
<input 
  id="data" 
  type="date"
  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">

            <button 
              onclick="adicionarGasto()"
              class="w-full bg-violet-600 hover:bg-violet-700 transition-colors text-white font-semibold py-4 rounded-2xl">
              Adicionar gasto
            </button>
          </div>
        </div>
      </div>

      <!-- Lista de gastos -->
      <div class="lg:col-span-7">
        <div class="bg-zinc-900 rounded-3xl p-8">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-semibold">Últimos gastos</h2>
            <span id="totalGasto" class="text-xl font-semibold text-emerald-400">R$ 0,00</span>
          </div>
          
          <div id="listaGastos" class="space-y-3">
            <!-- Preenchido via JavaScript -->
          </div>
        </div>
      </div>

    </div>

  </div>

<script>
// Array para armazenar os gastos
let gastos = [];

// Carrega os gastos salvos ao iniciar
function carregarGastos() {
  const salvos = localStorage.getItem('gastos');
  if (salvos) {
    gastos = JSON.parse(salvos);
  }
  renderizarLista();
  atualizarTotal();
}

// Salva os gastos no localStorage
function salvarGastos() {
  localStorage.setItem('gastos', JSON.stringify(gastos));
}

// Adiciona um novo gasto
function adicionarGasto() {
  const descricao = document.getElementById('descricao').value.trim();
  const valorStr = document.getElementById('valor').value;
  const data = document.getElementById('data').value;

  if (!descricao || !valorStr || !data) {
    alert('Por favor, preencha todos os campos.');
    return;
  }

  const valor = parseFloat(valorStr);

  gastos.unshift({
    id: Date.now(),
    descricao: descricao,
    valor: valor,
    data: data
  });

  salvarGastos();
  renderizarLista();
  atualizarTotal();

  // Limpa o formulário
  document.getElementById('descricao').value = '';
  document.getElementById('valor').value = '';
}

// Remove um gasto
function removerGasto(id) {
  if (confirm('Excluir este gasto?')) {
    gastos = gastos.filter(g => g.id !== id);
    salvarGastos();
    renderizarLista();
    atualizarTotal();
  }
}

// Atualiza o valor total
function atualizarTotal() {
  const total = gastos.reduce((acc, gasto) => acc + gasto.valor, 0);
  document.getElementById('totalGasto').textContent = 
    'R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
}

// Renderiza a lista de gastos
function renderizarLista() {
  const container = document.getElementById('listaGastos');
  
  if (gastos.length === 0) {
    container.innerHTML = `
      <div class="text-center py-12 text-zinc-500">
        Nenhum gasto registrado ainda.
      </div>`;
    return;
  }

  let html = '';
  
  gastos.forEach(gasto => {
    html += `
      <div class="flex items-center justify-between bg-zinc-800 rounded-2xl px-6 py-5 group">
        <div>
          <p class="font-medium">${gasto.descricao}</p>
          <p class="text-zinc-400 text-sm">${new Date(gasto.data).toLocaleDateString('pt-BR')}</p>
        </div>
        <div class="flex items-center gap-6">
          <span class="font-semibold text-lg">R$ ${gasto.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
          <button 
            onclick="removerGasto(${gasto.id})"
            class="text-red-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// Inicialização
window.onload = function() {
  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('data').value = hoje;
  
  carregarGastos();
};
</script>

</body>
</html>
