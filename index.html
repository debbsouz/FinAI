<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos IA • Controle Financeiro Inteligente</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <!-- CSS separado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-7xl mx-auto p-8">
    
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-2xl font-bold shadow-lg">
          GI
        </div>
        <div>
          <h1 class="text-4xl font-semibold tracking-tighter">Gastos IA</h1>
          <p class="text-zinc-400">Seu assistente financeiro inteligente</p>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <button onclick="exportarCSV()" 
          class="flex items-center gap-2 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium transition-all">
          <i class="fas fa-download"></i>
          Exportar CSV
        </button>
        <button onclick="limparTodosDados()" 
          class="flex items-center gap-2 px-6 py-3 bg-red-950 hover:bg-red-900 text-red-400 rounded-2xl text-sm font-medium transition-all">
          <i class="fas fa-trash"></i>
          Limpar dados
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">

      <!-- Coluna esquerda: Formulário + Orçamento -->
      <div class="xl:col-span-5 space-y-8">
        
        <!-- Novo Gasto -->
        <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
          <h2 class="text-2xl font-semibold mb-6">Registrar novo gasto</h2>
          <div class="space-y-6">
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Descrição</label>
              <input id="descricao" type="text" placeholder="Ex: Jantar com amigos no restaurante"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-zinc-400 text-sm mb-2">Valor</label>
                <div class="relative">
                  <span class="absolute left-6 top-4 text-zinc-400 font-medium">R$</span>
                  <input id="valor" type="number" step="0.01" placeholder="0,00"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl pl-14 pr-6 py-4 focus:outline-none">
                </div>
              </div>
              <div>
                <label class="block text-zinc-400 text-sm mb-2">Data</label>
                <input id="data" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none">
              </div>
            </div>

            <button onclick="adicionarGasto()" 
              class="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:brightness-110 font-semibold py-4 rounded-2xl text-lg shadow-lg">
              Adicionar gasto
            </button>
          </div>
        </div>

        <!-- Orçamento Mensal -->
        <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
          <h2 class="text-2xl font-semibold mb-6">Orçamento mensal</h2>
          <div class="flex gap-4">
            <input id="orcamentoMensal" type="number" placeholder="Valor do orçamento" 
              class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none">
            <button onclick="salvarOrcamento()" 
              class="px-8 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-medium transition-colors">
              Salvar
            </button>
          </div>
          <div id="progressoOrcamento" class="mt-6"></div>
        </div>

      </div>

      <!-- Coluna direita -->
      <div class="xl:col-span-7 space-y-8">

        <!-- Assistente IA -->
        <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
          <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
            <i class="fas fa-robot text-violet-400"></i>
            Assistente IA
          </h2>
          <div id="insights" class="min-h-[140px] space-y-5"></div>
        </div>

        <!-- Resumo por categoria -->
        <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
          <h2 class="text-2xl font-semibold mb-6">Resumo por categoria</h2>
          <div id="resumoCategorias" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
        </div>

        <!-- Gráficos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
            <h2 class="text-xl font-semibold mb-6">Distribuição de gastos</h2>
            <div class="h-72"><canvas id="pieChart"></canvas></div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 card-hover">
            <h2 class="text-xl font-semibold mb-6">Gastos por categoria</h2>
            <div class="h-72"><canvas id="barChart"></canvas></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Histórico -->
    <div class="mt-12 bg-zinc-900 rounded-3xl p-8 card-hover">
      <h2 class="text-2xl font-semibold mb-6">Histórico de gastos</h2>
      <div id="listaGastos" class="space-y-3"></div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
