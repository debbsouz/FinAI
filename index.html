<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos IA • Controle Financeiro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-7xl mx-auto p-8">
    
    <!-- Header -->
    <header class="flex items-center justify-between mb-12">
      <div class="flex items-center gap-4">
        <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-xl font-semibold">
          GI
        </div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tight">Gastos IA</h1>
          <p class="text-zinc-400 text-sm">Controle financeiro inteligente</p>
        </div>
      </div>
      
      <nav class="flex items-center gap-8 text-sm">
        <a href="#" class="text-white">Dashboard</a>
        <a href="#" class="hover:text-white transition-colors">Histórico</a>
        <a href="#" class="hover:text-white transition-colors">Relatórios</a>
      </nav>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- Formulário -->
      <div class="lg:col-span-5">
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h2 class="text-2xl font-semibold mb-6">Novo gasto</h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Descrição</label>
              <input id="descricao" type="text" placeholder="Ex: Almoço no restaurante"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500">
            </div>

            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-zinc-400 text-sm mb-2">Valor</label>
                <div class="relative">
                  <span class="absolute left-5 top-4 text-zinc-400">R$</span>
                  <input id="valor" type="number" step="0.01" placeholder="0,00"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl pl-12 pr-5 py-4 focus:outline-none focus:border-violet-500">
                </div>
              </div>

<label for="data" class="block text-zinc-400 text-sm mb-2">Data</label>
<input 
  id="data" 
  type="date"
  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">

            <button onclick="adicionarGasto()" 
              class="w-full bg-violet-600 hover:bg-violet-700 transition-colors text-white font-semibold py-4 rounded-2xl">
              Adicionar gasto
            </button>
          </div>
        </div>
      </div>

      <!-- Resumo e Gráficos -->
      <div class="lg:col-span-7 space-y-8">

        <!-- Resumo por categoria -->
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h2 class="text-2xl font-semibold mb-6">Resumo por categoria</h2>
          <div id="resumoCategorias" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Preenchido pelo JS -->
          </div>
        </div>

        <!-- Gráficos lado a lado -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          
          <!-- Gráfico de Pizza -->
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-xl font-semibold mb-6">Distribuição de gastos</h2>
            <div class="h-72">
              <canvas id="pieChart"></canvas>
            </div>
          </div>

          <!-- Gráfico de Barras -->
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h2 class="text-xl font-semibold mb-6">Gastos por categoria</h2>
            <div class="h-72">
              <canvas id="barChart"></canvas>
            </div>
          </div>

        </div>

      </div>

    </div>

    <!-- Lista de gastos -->
    <div class="mt-12 bg-zinc-900 rounded-3xl p-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold">Últimos gastos</h2>
        <span id="totalGasto" class="text-xl font-semibold text-emerald-400">R$ 0,00</span>
      </div>
      
      <div id="listaGastos" class="space-y-3">
      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
