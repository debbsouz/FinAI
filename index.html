<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos IA • Controle Financeiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-7xl mx-auto p-8">
    
    <header class="flex items-center justify-between mb-12">
      <div class="flex items-center gap-4">
        <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center text-xl font-semibold">
          GI
        </div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tight">Gastos IA</h1>
          <p class="text-zinc-400 text-sm">Controle financeiro inteligente</p>
        </div>
      </div>
      
      <nav class="flex items-center gap-8 text-sm">
        <a href="#" class="text-white">Dashboard</a>
        <a href="#" class="hover:text-white transition-colors">Histórico</a>
        <a href="#" class="hover:text-white transition-colors">Relatórios</a>
      </nav>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <div class="lg:col-span-5">
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h2 class="text-2xl font-semibold mb-6">Novo gasto</h2>
          
          <div class="space-y-6">
            <div>
              <label class="block text-zinc-400 text-sm mb-2">Descrição</label>
              <input 
                id="descricao" 
                type="text" 
                placeholder="Ex: Almoço no restaurante"
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">
            </div>

            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-zinc-400 text-sm mb-2">Valor</label>
                <div class="relative">
                  <span class="absolute left-5 top-4 text-zinc-400">R$</span>
                  <input 
                    id="valor" 
                    type="number" 
                    step="0.01"
                    placeholder="0,00"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl pl-12 pr-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">
                </div>
              </div>

              <div>
                <label class="block text-zinc-400 text-sm mb-2">Data</label>
                <input 
                  id="data" 
                  type="date"
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500 transition-colors">
              </div>
            </div>

            <button 
              onclick="adicionarGasto()"
              class="w-full bg-violet-600 hover:bg-violet-700 transition-colors text-white font-semibold py-4 rounded-2xl">
              Adicionar gasto
            </button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div class="bg-zinc-900 rounded-3xl p-8 h-full flex items-center justify-center">
          <p class="text-zinc-500">Resumo e gráficos aparecerão aqui nos próximos passos</p>
        </div>
      </div>

    </div>

  </div>

<script>
  function adicionarGasto() {
    const descricao = document.getElementById('descricao').value.trim();
    const valor = parseFloat(document.getElementById('valor').value);
    const data = document.getElementById('data').value;

    if (!descricao || !valor || !data) {
      alert('Preencha todos os campos');
      return;
    }

    console.log('Novo gasto adicionado:', { descricao, valor, data });

    document.getElementById('descricao').value = '';
    document.getElementById('valor').value = '';
    document.getElementById('data').value = '';
  }

  window.onload = function() {
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data').value = hoje;
  };
</script>

</body>
</html>
